version: "3.3"

# E2Eテスト専用のDB。開発用(docker-compose.yml)とは完全に分離し、開発中の実データを一切壊さない。
services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geo_info_viewer_e2e
    ports:
      - "5434:5432"
    volumes:
      - geo_info_viewer_e2e_pgdata:/var/lib/postgresql/data

volumes:
  geo_info_viewer_e2e_pgdata:
